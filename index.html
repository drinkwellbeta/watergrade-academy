<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaterGrade Academy — Career Pathway by Drinkwell</title>
  <meta name="description" content="From community water scout to water entrepreneur. The WaterGrade Academy is your structured pathway to build a career in safe water infrastructure across Bangladesh and India." />
  <meta property="og:title" content="WaterGrade Academy — Career Pathway by Drinkwell" />
  <meta property="og:description" content="Four levels. One mission. Build your career in safe water infrastructure." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { overflow-x: hidden; background: #0A1929; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }
    @keyframes float0 {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(20px, -30px) rotate(5deg); }
    }
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-15px, 25px) rotate(-3deg); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(10px, -20px) rotate(2deg); }
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #060E18; }
    ::-webkit-scrollbar-thumb { background: #2E86AB30; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #2E86AB50; }
    
    /* Responsive */
    @media (max-width: 900px) {
      .pathway-progress { flex-wrap: wrap !important; }
      .pathway-connector { display: none !important; }
      .tier-detail-grid { grid-template-columns: 1fr !important; }
      .tier-detail-body { padding: 24px !important; }
      .tier-detail-header { padding: 24px !important; }
      .tier-detail-footer { padding: 16px 24px !important; }
      .impact-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .journey-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .footer-grid { grid-template-columns: 1fr 1fr !important; }
      .nav-links { display: none !important; }
      .hero-tiers { flex-wrap: wrap !important; }
      .tier-stats { flex-wrap: wrap !important; }
    }
    @media (max-width: 600px) {
      .impact-grid { grid-template-columns: 1fr !important; }
      .journey-grid { grid-template-columns: 1fr !important; }
      .footer-grid { grid-template-columns: 1fr !important; }
      .hero-buttons { flex-direction: column !important; align-items: stretch !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

    // --- DATA ---
    const TIERS = [
      {
        id: "grader", title: "WaterGrader", subtitle: "Community Scout",
        icon: React.createElement(ShieldIcon, {size:32}), color: "#2E86AB", lightColor: "#E8F4F8", accentColor: "#1B6B8A",

        description: "WaterGraders are the eyes and ears of their communities. Using the WaterGrade survey tool, they test and report water quality data, identify contamination risks, and raise awareness about safe drinking water. No technical background required — just a commitment to your community's health.",

        requirements: ["Complete WaterGrade orientation (online, 2 hours)","Pass the Water Safety Fundamentals quiz (80%+)","Submit 10 verified water quality surveys via the WaterGrade app","Complete 1 community awareness session (in-person or virtual)","Achieve a Quality Score of 85%+ on submitted surveys"],

      {
        id: "fixer", title: "WaterFixer", subtitle: "Field Technician",
        icon: React.createElement(WrenchIcon, {size:32}), color: "#1B998B", lightColor: "#E6F5F3", accentColor: "#147A6E",
        tagline: "Fix what's broken. Keep the water flowing.",
        description: "WaterFixers are trained field technicians who install, maintain, and repair HIX-Nano™ filtration systems. They are the backbone of Drinkwell's service delivery, ensuring that every water treatment plant operates at peak performance. This hands-on certification combines classroom theory with supervised field work.",
        duration: "8-12 weeks", format: "Blended (classroom + field practicum)", credential: "Certified WaterFixer Technician",
        requirements: ["Active WaterGrader certification","Complete 40-hour HIX-Nano™ Technical Training","Pass written exam on water treatment systems (75%+)","Complete 80 hours supervised field practicum","Successfully perform 5 independent maintenance cycles","First Aid & safety certification"],
        skills: ["HIX-Nano™ filter media installation & replacement","Water treatment plant maintenance protocols","Water quality testing & calibration (advanced)","Basic plumbing & electrical troubleshooting","Inventory management & supply chain basics","Customer service & community engagement","Digital reporting via Drinkwell Field App"],
        outcomes: ["Certified WaterFixer credential (valid 2 years)","Employment-ready for Drinkwell service network","Eligible to advance to WaterOperator","Access to regional technician network","Tool kit & PPE provided upon certification","Priority placement for paid service contracts"],
        stats: { enrolled: "1,600+", certified: "980+", countries: "2" },
      },
      {
        id: "operator", title: "WaterOperator", subtitle: "Plant Manager",
        icon: React.createElement(SettingsIcon, {size:32}), color: "#E8871E", lightColor: "#FFF3E6", accentColor: "#C46F0E",
        tagline: "Run the plant. Serve the people. Own the outcome.",
        description: "WaterOperators manage one or more water treatment plants end-to-end — from daily operations and water quality compliance to revenue collection and community relations. This certification develops the business acumen and technical mastery needed to run a self-sustaining water service point.",

        requirements: ["Active WaterFixer certification (12+ months)","Complete 60-hour Operations Management course","Pass business fundamentals exam (80%+)","Complete 120-hour managed apprenticeship at active plant","Demonstrate proficiency in financial reporting","Achieve 95%+ uptime on managed plant for 30 days","Community satisfaction score of 4.0+/5.0"],
        skills: ["Plant operations & maintenance scheduling","Revenue collection & financial management","Water quality compliance & regulatory reporting","Staff supervision & shift management","Inventory forecasting & procurement","Customer relationship management","Data-driven performance optimization","Government & utility liaison"],
        outcomes: ["Certified WaterOperator credential (valid 2 years)","Eligible to manage Drinkwell plant independently","Revenue-sharing compensation model","Eligible to advance to WaterPartner","Access to Operator peer network & mentorship","Annual performance bonus eligibility"],

    const FAQ_DATA = [
      { q: "Who can become a WaterGrader?", a: "Anyone! WaterGrader is our entry-level certification designed to be accessible to community members of all backgrounds. You need a smartphone with the WaterGrade app, basic literacy, and a passion for clean water. We provide all training materials in Bengali, Hindi, English, and other regional languages." },
      { q: "How much does the program cost?", a: "The WaterGrader certification is completely free. WaterFixer training is subsidized through our partnerships with government PHEDs and development agencies — most candidates pay nothing or a small materials fee. WaterOperator and WaterPartner programs may involve co-investment, with financing options available through our microfinance partners." },
      { q: "How long does it take to go from Grader to WaterPartner?", a: "The fastest pathway takes approximately 3-4 years, though most candidates progress over 4-6 years. The timeline depends on your pace of learning, the availability of field placements, and your performance at each level. Each certification has minimum experience requirements before advancing." },
      { q: "Are certifications recognized by government agencies?", a: "Yes. Our WaterFixer and WaterOperator certifications are aligned with national skill development frameworks in both Bangladesh and India. We work closely with DWASA, state PHEDs, and the Jal Jeevan Mission to ensure our training meets government standards for water treatment plant operation." },

      { q: "What is the earning potential at each level?", a: "WaterGraders can earn stipends for high-volume surveying. WaterFixers earn competitive technician wages in their local market. WaterOperators participate in revenue-sharing models tied to plant performance. WaterPartners build equity in their own water businesses with uncapped earning potential." },
    ];

    const IMPACT_NUMBERS = [
      { label: "People Served Daily", value: "3M+", icon: React.createElement(UsersIcon, {size:28}) },

    const WaterAnimation = () => (

        ))}

    const NavBar = ({ activeSection, onNavigate }) => {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const handler = () => setScrolled(window.scrollY > 40);
        window.addEventListener("scroll", handler);
        return () => window.removeEventListener("scroll", handler);
      }, []);

        { id: "pathway", label: "Career Pathway" },
        { id: "catalog", label: "Course Catalog" },
        { id: "impact", label: "Impact" },
        { id: "faq", label: "FAQ" },

              ))}
              <button style={{
                background: "linear-gradient(135deg, #2E86AB, #1B998B)",
                color: "#fff", border: "none", borderRadius: 8, padding: "10px 20px",
                fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600,
                cursor: "pointer", boxShadow: "0 4px 15px rgba(46,134,171,0.3)",

    const HeroSection = () => (
      <section id="hero" style={{
        minHeight: "100vh", position: "relative", overflow: "hidden",

        <WaterAnimation />
        <div style={{ position: "absolute", inset: 0, opacity: 0.03, backgroundImage: "linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px)", backgroundSize: "60px 60px" }} />
        <div style={{ position: "relative", zIndex: 1, maxWidth: 900, textAlign: "center" }}>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "rgba(46,134,171,0.12)", border: "1px solid rgba(46,134,171,0.25)", borderRadius: 100, padding: "8px 20px", marginBottom: 32, animation: "fadeInDown 0.8s ease" }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#1B998B", animation: "pulse 2s ease-in-out infinite" }} />

          </div>
          <h1 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: "clamp(36px, 6vw, 72px)", fontWeight: 800, color: "#fff", lineHeight: 1.08, margin: "0 0 24px", letterSpacing: "-0.03em", animation: "fadeInUp 0.8s ease 0.1s both" }}>

              { title: "Resources", links: ["Course Catalog", "WaterGrade App", "Field Guides", "Success Stories"] },
              { title: "Company", links: ["About Drinkwell", "HIX-Nano™ Technology", "Careers", "Contact"] },
            ].map((col) => (
              <div key={col.title}>
                <h4 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.5)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 16 }}>{col.title}</h4>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {col.links.map((link) => (
                    <a key={link} href="#" style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "rgba(255,255,255,0.35)", textDecoration: "none" }}>{link}</a>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <div style={{ borderTop: "1px solid rgba(255,255,255,0.04)", paddingTop: 24, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16 }}>
            <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "rgba(255,255,255,0.2)" }}>© 2026 WIST, Inc. (Drinkwell). All rights reserved. · WaterGrade.org</span>
            <div style={{ display: "flex", gap: 16 }}>
              {["Privacy", "Terms", "Accessibility"].map((l) => (
                <a key={l} href="#" style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "rgba(255,255,255,0.2)", textDecoration: "none" }}>{l}</a>
              ))}
            </div>
          </div>
        </div>
      </footer>
    );

    // --- MAIN APP ---
    function App() {
      const [activeSection, setActiveSection] = useState("hero");
      const navigateTo = (id) => {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: "smooth" });
      };
      useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => { entries.forEach((entry) => { if (entry.isIntersecting) setActiveSection(entry.target.id); }); },
          { threshold: 0.3 }
        );
        ["hero", "pathway", "catalog", "impact", "faq"].forEach((id) => {
          const el = document.getElementById(id);
          if (el) observer.observe(el);
        });
        return () => observer.disconnect();
      }, []);

      return (
        <div style={{ background: "#0A1929", minHeight: "100vh" }}>
          <NavBar activeSection={activeSection} onNavigate={navigateTo} />
          <HeroSection />
          <PathwaySection />
          <CourseCatalog />
          <ImpactSection />
          <FAQSection />
          <CTASection />
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
